<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>أبطال اللغة العربية - مبادرة الأستاذة غادة الرحيلي</title>
    <style>
        /* التنسيق المركز والمحفز المستوحى من النسخة الحسابية */
        body { font-family: 'Arial', sans-serif; text-align: center; margin-top: 20px; background-color: #f0f7ff; }
        .container { max-width: 1000px; margin: auto; padding: 20px; border: 5px solid #4dabf7; border-radius: 20px; background: #fff; box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
        h1 { color: #4dabf7; text-shadow: 1px 1px 2px #abd5f7; }
        
        .names-input-section { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 20px; padding: 15px; border: 1px dashed #ccc; border-radius: 8px; }
        .folder { width: 33%; text-align: right; }
        .folder label { font-weight: bold; color: #e63946; }
        textarea { width: 100%; height: 80px; resize: none; margin-top: 5px; border: 1px solid #ddd; border-radius: 5px; padding: 5px; }
        
        .round-setup { margin-bottom: 20px; padding: 15px; background-color: #f1f3f5; border-radius: 12px; display: flex; justify-content: center; align-items: center; gap: 15px; flex-wrap: wrap; }
        select, button { padding: 10px 15px; border-radius: 8px; border: 1px solid #ffd43b; cursor: pointer; font-family: inherit; font-weight: bold; }

        #timer-display { font-size: 2.5em; font-weight: bold; color: #333; padding: 10px 25px; border: 3px dashed #ffd43b; border-radius: 10px; display: inline-block; margin-bottom: 20px; background: #fff; }
        
        #question-box { margin: 20px auto; min-height: 120px; }
        #q-type-label { font-size: 1.8em; color: #e63946; font-weight: bold; margin-bottom: 10px; }
        #word-to-solve { font-size: 4em; font-weight: bold; color: #2c3e50; text-shadow: 1px 1px #eee; }

        .answer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 800px; margin: 20px auto; }
        .answer-btn { background-color: #4dabf7; color: white; padding: 25px; font-size: 2em; border: none; cursor: pointer; border-radius: 15px; box-shadow: 0 6px #339af0; transition: 0.1s; font-weight: bold; }
        .answer-btn:active { transform: translateY(3px); box-shadow: 0 3px #339af0; }
        .correct-anim { background-color: #40c057 !important; box-shadow: 0 6px #2f9e44 !important; }
        .wrong-anim { background-color: #e63946 !important; box-shadow: 0 6px #c92a2a !important; }

        .footer { margin-top: 50px; padding: 15px; border-top: 1px solid #ccc; font-weight: bold; color: #555; font-size: 1.1em; }
        #words-left-stat { color: #e63946; font-weight: bold; font-size: 1.2em; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏆 أبطال اللغة العربية 🏆</h1>

    <div class="names-input-section" id="setup-area">
        <div class="folder">
            <label>المجموعة (أ)</label>
            <textarea id="names-A" placeholder="ضع الأسماء هنا (كل اسم في سطر)..."></textarea>
        </div>
        <div class="folder">
            <label>المجموعة (ب)</label>
            <textarea id="names-B" placeholder="ضع الأسماء هنا..."></textarea>
        </div>
        <div class="folder">
            <label>المجموعة (ج)</label>
            <textarea id="names-C" placeholder="ضع الأسماء هنا..."></textarea>
        </div>
    </div>

    <div class="round-setup">
        <label>المجموعة:</label>
        <select id="folder-select"><option value="A">أ</option><option value="B">ب</option><option value="C">ج</option></select>
        <label>التحدي:</label>
        <select id="mode-select"><option value="syn">المرادفات</option><option value="ant">الأضداد</option><option value="mix">مختلط</option></select>
        <button onclick="startTournament()" style="background:#40c057; color:white;">بدء المسابقة</button>
        <button id="next-round-btn" onclick="newMatch()" style="display:none; background:#4dabf7; color:white;">جولة إقصاء جديدة</button>
    </div>

    <div id="play-zone" style="display:none;">
        <div id="timer-display">15</div>
        <div style="font-size:1.8em; margin-bottom:10px;">الدور على البطل: <span id="current-p-name" style="color:#1c7ed6">---</span></div>
        <div id="question-box">
            <div id="q-type-label">---</div>
            <div id="word-to-solve">---</div>
        </div>
        <div class="answer-grid" id="options-container"></div>
        <div id="feedback" style="font-size:1.5em; height:1.5em; margin-top:10px; font-weight:bold;"></div>
        <div id="words-left-stat">الكلمات المتبقية: <span id="words-count">100</span></div>
        
        <div style="display:flex; justify-content:space-around; margin-top:20px; font-weight:bold; font-size:1.3em;">
            <div id="score1">المتسابق 1: 0</div>
            <div id="score2">المتسابق 2: 0</div>
        </div>
    </div>

    <div class="footer">
        مبادرة من الأستاذة: غادة الرحيلي - المتوسطة الثانية والثلاثون بالمدينة المنورة
    </div>
</div>

<script>
    // بنك كلمات حقيقي 100% (تم استبدال الرموز بكلمات عربية أصيلة)
    const dictionary = [
        {w:"تفاؤل", s:"استبشار", a:"تشاؤم"}, {w:"شجاع", s:"جسور", a:"جبان"}, {w:"كريم", s:"سخي", a:"بخيل"},
        {w:"واسع", s:"فسيح", a:"ضيق"}, {w:"ذكي", s:"فطين", a:"بليد"}, {w:"جميل", s:"وسيم", a:"قبيح"},
        {w:"قوي", s:"شديد", a:"ضعيف"}, {w:"سهل", s:"يسير", a:"عسير"}, {w:"نور", s:"ضياء", a:"ظلام"},
        {w:"علم", s:"معرفة", a:"جهل"}, {w:"فوز", s:"نصر", a:"هزيمة"}, {w:"بداية", s:"استهلال", a:"نهاية"},
        {w:"نظيف", s:"طاهر", a:"متسخ"}, {w:"بناء", s:"تشييد", a:"هدم"}, {w:"عادل", s:"منصف", a:"ظالم"},
        {w:"سريع", s:"عجول", a:"بطيء"}, {w:"فرح", s:"حبور", a:"ترح"}, {w:"ثابت", s:"راسخ", a:"متردد"},
        {w:"ضخم", s:"عملاق", a:"قزم"}, {w:"يقين", s:"تأكد", a:"ريب"}, {w:"بشاشة", s:"طلاقة", a:"تجهم"},
        {w:"غني", s:"ثري", a:"فقير"}, {w:"قديم", s:"عتيق", a:"جديد"}, {w:"هادئ", s:"وديع", a:"صاخب"},
        {w:"يسر", s:"رخاء", a:"شدة"}, {w:"عزة", s:"كرامة", a:"ذلة"}, {w:"باسل", s:"مغوار", a:"رعديد"},
        {w:"عطب", s:"خلل", a:"إصلاح"}, {w:"إقدام", s:"جسارة", a:"إحجام"}, {w:"وهن", s:"خور", a:"قوة"},
        {w:"صمت", s:"وجوم", a:"ضجيج"}, {w:"حق", s:"صواب", a:"باطل"}, {w:"صدق", s:"حقيقة", a:"زيف"},
        {w:"أبيض", s:"ناصع", a:"حالك"}, {w:"قريب", s:"داني", a:"قاصي"}, {w:"كثير", s:"وافر", a:"نزر"},
        {w:"رحيم", s:"رؤوف", a:"قاسي"}, {w:"نجاح", s:"فلاح", a:"خيبة"}, {w:"ناعم", s:"أملس", a:"خشن"},
        {w:"مر", s:"علقم", a:"حلو"}, {w:"نشيط", s:"مثابر", a:"خامل"}, {w:"أبدي", s:"سرمدي", a:"مؤقت"},
        {w:"مفتوح", s:"مشرع", a:"موصد"}, {w:"مريح", s:"هانئ", a:"مضني"}, {w:"رقيق", s:"لطيف", a:"فظ"},
        {w:"بزغ", s:"أشرق", a:"أفل"}, {w:"صامت", s:"ساكت", a:"متحدث"}, {w:"غدر", s:"خيانة", a:"وفاء"},
        {w:"فجر", s:"فلق", a:"غسق"}, {w:"عظيم", s:"جليل", a:"حقير"}, {w:"مودة", s:"محبة", a:"كراهية"},
        {w:"أمان", s:"سلم", a:"خطر"}, {w:"جوع", s:"سغب", a:"شبع"}, {w:"ارتقاء", s:"صعود", a:"هبوط"},
        {w:"ثناء", s:"مدح", a:"ذم"}, {w:"أخفى", s:"كتم", a:"أعلن"}, {w:"إعسار", s:"ضيق", a:"يسار"},
        {w:"فريد", s:"نادر", a:"شائع"}, {w:"ساكن", s:"هادئ", a:"صاخب"}, {w:"استبشار", s:"تفاؤل", a:"قنوط"},
        {w:"تكبر", s:"غطرسة", a:"تواضع"}, {w:"جود", s:"سخاء", a:"بخل"}, {w:"رحمة", s:"رأفة", a:"قسوة"},
        {w:"لئيم", s:"خسيس", a:"كريم"}, {w:"حذر", s:"حيطة", a:"تهور"}, {w:"أقام", s:"مكث", a:"رحل"},
        {w:"صرخ", s:"صاح", a:"همس"}, {w:"نجح", s:"أفلح", a:"فشل"}, {w:"يبغض", s:"يكره", a:"يهوى"},
        {w:"قصير", s:"موجز", a:"طويل"}, {w:"خاسر", s:"خائب", a:"فائز"}, {w:"أعمى", s:"كفيف", a:"بصير"},
        {w:"صلب", s:"قاسٍ", a:"لين"}, {w:"رزين", s:"ثقيل", a:"طائش"}, {w:"رحب", s:"واسع", a:"ضيق"},
        {w:"نضج", s:"استوى", a:"فج"}, {w:"رشد", s:"حكمة", a:"طيش"}, {w:"عتمة", s:"ظلام", a:"ضياء"},
        {w:"مألوف", s:"معتاد", a:"غريب"}, {w:"شاسع", s:"فاسح", a:"محدود"}, {w:"خالد", s:"باقٍ", a:"فانٍ"},
        {w:"نزيه", s:"شريف", a:"فاسد"}, {w:"مسرف", s:"مبذر", a:"مقتصد"}, {w:"ماهر", s:"بارع", a:"هاوٍ"},
        {w:"شاق", s:"مضنٍ", a:"مريح"}, {w:"رقيق", s:"نحيف", a:"غليظ"}, {w:"أمل", s:"رجاء", a:"يأس"},
        {w:"يحفظ", s:"يصون", a:"يضيع"}, {w:"تكاتف", s:"تآزر", a:"تخاذل"}, {w:"خجل", s:"حياء", a:"وقاحة"},
        {w:"نبه", s:"فطن", a:"غافل"}, {w:"بزغ", s:"ظهر", a:"أفل"}, {w:"جرأة", s:"إقدام", a:"جبن"},
        {w:"تعب", s:"نصب", a:"راحة"}, {w:"أمن", s:"أمان", a:"خوف"}, {w:"ذلة", s:"مهانة", a:"عزة"},
        {w:"قمة", s:"ذروة", a:"قاع"}, {w:"نزر", s:"قليل", a:"وفير"}, {w:"حائط", s:"جدار", a:"فضاء"}
    ];

    let activeBank = [], inPlay = [], p1, p2, p1w, p2w, turn, qCount, timer, correctStr;

    function startTournament() {
        const k = document.getElementById('folder-select').value;
        const names = document.getElementById('names-'+k).value.split('\n').filter(n => n.trim() !== "");
        if(names.length < 2) return alert("أدخل اسمين على الأقل في المجموعة المختارة!");
        inPlay = names;
        activeBank = [...dictionary].sort(() => Math.random() - 0.5);
        document.getElementById('setup-area').style.opacity = "0.5";
        document.getElementById('next-round-btn').style.display = "inline-block";
        alert("جاهزون! تم تحميل 100 كلمة حقيقية.");
    }

    function newMatch() {
        if(inPlay.length < 2) return alert("انتهت البطولة!");
        let shuf = [...inPlay].sort(() => Math.random() - 0.5);
        p1 = shuf[0]; p2 = shuf[1]; p1w=0; p2w=0; qCount=0; turn=1;
        document.getElementById('play-zone').style.display = "block";
        document.getElementById('next-round-btn').style.display = "none";
        document.getElementById('score1').innerText = p1 + ": 0";
        document.getElementById('score2').innerText = p2 + ": 0";
        nextQuestion();
    }

    function nextQuestion() {
        clearInterval(timer);
        document.getElementById('feedback').innerText = "";
        if(activeBank.length === 0) activeBank = [...dictionary].sort(() => Math.random() - 0.5);
        const obj = activeBank.pop(); // سحب بدون تكرار
        document.getElementById('words-count').innerText = activeBank.length;

        let mode = document.getElementById('mode-select').value;
        if(mode === 'mix') mode = Math.random() > 0.5 ? 'syn' : 'ant';

        document.getElementById('current-p-name').innerText = (turn === 1 ? p1 : p2);
        document.getElementById('word-to-solve').innerText = obj.w;
        
        if(mode === 'syn') {
            document.getElementById('q-type-label').innerText = "ما هو مرادف كلمة:";
            correctStr = obj.s;
        } else {
            document.getElementById('q-type-label').innerText = "ما هو ضد كلمة:";
            correctStr = obj.a;
        }

        // توليد 4 خيارات حقيقية
        let opts = [correctStr];
        while(opts.length < 4) {
            let r = dictionary[Math.floor(Math.random()*dictionary.length)];
            let v = (mode === 'syn' ? r.s : r.a);
            if(!opts.includes(v)) opts.push(v);
        }
        opts.sort(() => Math.random() - 0.5);

        document.getElementById('options-container').innerHTML = opts.map(o => `<button class="answer-btn" onclick="check('${o}', this)">${o}</button>`).join('');
        startTimer();
    }

    function check(o, btn) {
        clearInterval(timer);
        const btns = document.querySelectorAll('.answer-btn');
        btns.forEach(b => b.disabled = true);

        if(o === correctStr) {
            btn.classList.add('correct-anim');
            if(turn === 1) p1w++; else p2w++;
            document.getElementById('feedback').innerHTML = "<span style='color:green'>إجابة صحيحة ✅</span>";
        } else {
            btn.classList.add('wrong-anim');
            document.getElementById('feedback').innerHTML = `<span style='color:red'>خطأ! الإجابة هي: ${correctStr}</span>`;
        }

        document.getElementById('score1').innerText = p1 + ": " + p1w;
        document.getElementById('score2').innerText = p2 + ": " + p2w;
        qCount++;
        setTimeout(() => { if(qCount < 2) { turn = 2; nextQuestion(); } else { finalize(); } }, 2000);
    }

    function finalize() {
        let win, lose;
        if(p1w > p2w) { win = p1; lose = p2; }
        else if(p2w > p1w) { win = p2; lose = p1; }
        else { document.getElementById('feedback').innerText = "تعادل! سؤال فاصل..."; qCount--; return nextQuestion(); }

        alert("الفائز: " + win + " | هاردلك: " + lose);
        inPlay = inPlay.filter(n => n !== lose);
        document.getElementById('play-zone').style.display = "none";
        document.getElementById('next-round-btn').style.display = "inline-block";
        if(inPlay.length === 1) alert("🏆 البطل النهائي: " + win);
    }

    function startTimer() {
        let s = 15; document.getElementById('timer-display').innerText = s;
        timer = setInterval(() => { s--; document.getElementById('timer-display').innerText = s; if(s <= 0) { clearInterval(timer); check('', null); } }, 1000);
    }
</script>
</body>
</html>
